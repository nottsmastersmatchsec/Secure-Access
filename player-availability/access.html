<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Player Availability — Access Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/Home/style.css">
</head>


<body>

<div class="page-wrapper">

<header style="background:#0a1a33;color:white;padding:20px;text-align:center;">
  <h1>Notts Masters Badminton</h1>
  <p>Player Availability</p>
</header>

<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(r => r.text())
    .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div style="max-width:900px;margin:40px auto;text-align:center;">
  <h2 id="status">Checking access…</h2>
</div>

<footer style="margin-top:40px;padding:20px;text-align:center;background:#0a1a33;color:white;">
  © Notts Masters Badminton — Player Availability
</footer>

</div>

<script>
  // Run AFTER layout loads
  window.addEventListener("DOMContentLoaded", () => {

    const raw = localStorage.getItem("clubSession");
    if (!raw) {
      window.location.href = "/Home/login/availability-login.html";
      return;
    }

    let session;
    try { session = JSON.parse(raw); }
    catch {
      localStorage.removeItem("clubSession");
      window.location.href = "/Home/login/availability-login.html";
      return;
    }

    const role = (session.captain_selector || "").toLowerCase().trim();

    if (role === "captain" || role === "selector") {
      window.location.href = "/Home/captains/access.html";
    } else {
      window.location.href = "/Home/player-availability/form.html";
    }

  });
</script>

</body>
</html>
