<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Player Availability — DEBUG MODE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>

<h2>DEBUG MODE — Player Availability Access</h2>
<p>If you see this, redirects are not firing.</p>

<pre id="debugBox" style="background:#eee;padding:20px;border-radius:8px;"></pre>

<script>
  const raw = localStorage.getItem("clubSession");
  const debug = document.getElementById("debugBox");

  debug.innerHTML += "RAW SESSION:\n" + raw + "\n\n";

  if (!raw) {
    debug.innerHTML += "NO RAW SESSION — redirecting to login...\n";
    window.location.href = "/Home/login/login.html?redirect=availability";
  }

  let session;
  try { session = JSON.parse(raw); }
  catch {
    debug.innerHTML += "JSON PARSE FAILED — clearing session...\n";
    localStorage.removeItem("clubSession");
    window.location.href = "/Home/login/login.html?redirect=availability";
  }

  debug.innerHTML += "PARSED SESSION:\n" + JSON.stringify(session, null, 2) + "\n\n";

  if (!session || !session.loggedIn) {
    debug.innerHTML += "NOT LOGGED IN — redirecting...\n";
    window.location.href = "/Home/login/login.html?redirect=availability";
  }

  const role = (session.captain_selector || "").toLowerCase().trim();
  debug.innerHTML += "DETECTED ROLE: " + role + "\n\n";

  if (role === "captain" || role === "selector") {
    debug.innerHTML += "REDIRECT → captains page\n";
    window.location.href = "/Home/captains/access.html";
  } else {
    debug.innerHTML += "REDIRECT → player form\n";
    window.location.href = "/Home/player-availability/form.html";
  }
</script>

</body>
</html>
