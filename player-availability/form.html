<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Player Availability Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
<div class="page-wrapper">

<header style="background:#0a1a33;color:white;padding:20px;text-align:center;">
  <h1>Player Availability Form</h1>
</header>

<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(r => r.text())
    .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div style="max-width:900px;margin:40px auto;">
  <h2>Submit Your Availability</h2>

  <form>
    <label>Date
      <input type="date" required />
    </label>

    <label>Availability
      <select required>
        <option value="">Select…</option>
        <option value="available">Available</option>
        <option value="not available">Not Available</option>
      </select>
    </label>

    <label>Notes
      <textarea rows="4"></textarea>
    </label>

    <button type="submit">Submit</button>
  </form>
</div>

<footer style="margin-top:40px;padding:20px;text-align:center;background:#0a1a33;color:white;">
  © Notts Masters Badminton — Player Availability
</footer>

</div>
</body>
</html>
