<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captains Area — Access Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }
    body > div { margin: 0 !important; padding: 0 !important; max-width: 100% !important; }
    .page-wrapper { max-width: 1000px; margin: 0 auto; }
    header { background: #0a1a33; color: white; padding: 20px; text-align: center; }
    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }
    nav a:hover { text-decoration: underline; }
    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<div class="page-wrapper">

<header>
  <h1>Notts Masters Badminton</h1>
  <p>Captains & Selectors Area</p>
</header>

<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(r => r.text())
    .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div style="max-width:900px;margin:40px auto;text-align:center;">
  <h2 id="status">Checking access…</h2>
</div>

<footer>
  © Notts Masters Badminton — Captains Area
</footer>

</div>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    const raw = localStorage.getItem("clubSession");
    if (!raw) {
      window.location.href = "/Home/login/captains-login.html";
      return;
    }

    let session = JSON.parse(raw);
    const role = (session.captain_selector || "").toLowerCase().trim();

    if (role === "captain" || role === "selector") {
      window.location.href = "/Home/captains/dashboard.html";
    } else {
      document.getElementById("status").innerText = "You do not have access to this area.";
    }
  });
</script>

</body>
</html>
