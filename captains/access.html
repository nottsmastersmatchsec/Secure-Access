<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captains & Selectors Area — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
      color: #0a1a33;
    }

    .captain-btn {
      display: block;
      margin: 12px 0;
      padding: 12px;
      background: #0a1a33;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }

    .captain-btn:hover {
      background: #1a73e8;
    }

    .error {
      margin-top: 20px;
      color: #c62828;
      font-size: 1rem;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<header>
  <h1>Notts Masters Badminton</h1>
  <p id="welcome-text">Captains & Selectors Area</p>
</header>

<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(r => r.text())
    .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div id="content">
  <div class="container">
    <h2>Checking access…</h2>
    <p>Please wait.</p>
  </div>
</div>

<footer>
  © Notts Masters Badminton — Captains & Selectors Area
</footer>

<script>
  const session = JSON.parse(localStorage.getItem("clubSession") || "{}");
  const content = document.getElementById("content");
  const welcomeText = document.getElementById("welcome-text");

  // If not logged in → send back to login
  if (!session.loggedIn) {
    window.location.href = "/Home/captains/login.html";
  }

  const role = (session.captain_selector || "").toLowerCase().trim();
  const name = session.first_name || "Captain";

  // Update header welcome text
  welcomeText.textContent = `Welcome – ${name}`;

  // If not captain/selector → deny access
  if (role !== "captain" && role !== "selector") {
    content.innerHTML = `
      <div class="container">
        <h2>Access Denied</h2>
        <p class="error">You do not have permission to access the Captains Area.</p>
      </div>
    `;
  } else {
    // Show the full captains area
    content.innerHTML = `
      <div class="container">
        <h2>Welcome, ${name}</h2>
        <p>Select a resource below:</p>

        <a class="captain-btn" href="/Home/captains/players.html">Notts Masters Players</a>
        <a class="captain-btn" href="/Home/captains/matches.html">Notts Masters Matches</a>
        <a class="captain-btn" href="/Home/captains/calendar.html">Captains & Selectors Match Calendar</a>
        <a class="captain-btn" href="/Home/captains/availability.html">Player Availability</a>
      </div>
    `;
  }
</script>

</body>
</html>
