<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captains & Selectors Area — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
      color: #0a1a33;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #1a73e8;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1558b4;
    }

    .error {
      margin-top: 12px;
      color: #c62828;
      font-size: 0.9rem;
      display: none;
    }

    .success {
      margin-top: 20px;
      font-size: 1rem;
      display: none;
    }

    .success a {
      display: block;
      margin: 12px 0;
      padding: 12px;
      background: #0a1a33;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }

    .success a:hover {
      background: #1a73e8;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Notts Masters Badminton</h1>
  <p>Captains & Selectors Area — Secure Access</p>
</header>

<!-- Shared nav include -->
<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("nav").innerHTML = data;
    });
</script>

<div class="container">
  <h2>Enter Password</h2>
  <p>This section is restricted to Captains & Selectors only.</p>

  <input type="password" id="password" placeholder="Enter password" autocomplete="off" />
  <button id="submitBtn">Unlock</button>

  <div id="error" class="error">❌ Incorrect password. Please try again.</div>

  <div id="success" class="success">
    ✅ Access granted.<br><br>
    <a id="docLink1" href="#" target="_blank" rel="noopener noreferrer">Notts Masters Players</a>
    <a id="docLink2" href="#" target="_blank" rel="noopener noreferrer">Notts Masters Matches</a>
  </div>
</div>

<footer>
  © Notts Masters Badminton — Captains & Selectors Area
</footer>

<script>
  const PASSWORD = "YourStrongPassword123";

  const DOC_URL_1 = "https://docs.google.com/spreadsheets/d/14KBz9GBGR7p48cdM8p34FPGbhoaRUHX3OUhXRh9deNs/edit?gid=1020199153#gid=1020199153";
  const DOC_URL_2 = "https://docs.google.com/spreadsheets/d/1MomVFN0gpfM_bYldQ5Df9CjwOkYRGOMSGtmv2PWyMiw/edit?gid=0#gid=0";

  const passwordInput = document.getElementById("password");
  const submitBtn = document.getElementById("submitBtn");
  const errorEl = document.getElementById("error");
  const successEl = document.getElementById("success");
  const docLink1 = document.getElementById("docLink1");
  const docLink2 = document.getElementById("docLink2");

  submitBtn.addEventListener("click", () => {
    const value = passwordInput.value.trim();
    if (value === PASSWORD) {
      errorEl.style.display = "none";
      successEl.style.display = "block";
      docLink1.href = DOC_URL_1;
      docLink2.href = DOC_URL_2;
    } else {
      successEl.style.display = "none";
      errorEl.style.display = "block";
    }
  });

  passwordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      submitBtn.click();
    }
  });
</script>

</body>
</html>
