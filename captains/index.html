
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure Document Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #ffffff;
      padding: 24px 28px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 100%;
    }
    h1 {
      font-size: 1.2rem;
      margin: 0 0 12px;
      text-align: center;
    }
    p {
      font-size: 0.9rem;
      color: #555;
      margin: 0 0 16px;
      text-align: center;
    }
    label {
      font-size: 0.85rem;
      display: block;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 9px 10px;
      border-radius: 6px;
      border: none;
      background: #1a73e8;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover {
      background: #1558b4;
    }
    .error {
      margin-top: 10px;
      color: #c62828;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
    .success {
      margin-top: 14px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .success a {
      display: block;
      margin: 10px 0;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }
    .success a:hover {
      background: #1558b4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Secure Document Repository</h1>
    <p>Enter the access password to view the documents.</p>

    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="off" />

    <button id="submitBtn">Unlock</button>

    <div id="error" class="error">Incorrect password. Please try again.</div>

    <div id="success" class="success">
      Access granted.
      <a id="docLink1" href="#" target="_blank" rel="noopener noreferrer">Notts Masters Players</a>
      <a id="docLink2" href="#" target="_blank" rel="noopener noreferrer">Notts Masters Matches</a>
    </div>
    
    
  </div>

  <script>
    // Password
    const PASSWORD = "YourStrongPassword123";

    // Spreadsheet links
    const DOC_URL_1 = "https://docs.google.com/spreadsheets/d/14KBz9GBGR7p48cdM8p34FPGbhoaRUHX3OUhXRh9deNs/edit?gid=1020199153#gid=1020199153";
    const DOC_URL_2 = "https://docs.google.com/spreadsheets/d/1MomVFN0gpfM_bYldQ5Df9CjwOkYRGOMSGtmv2PWyMiw/edit?gid=0#gid=0";
    const passwordInput = document.getElementById("password");
    const submitBtn = document.getElementById("submitBtn");
    const errorEl = document.getElementById("error");
    const successEl = document.getElementById("success");
    const docLink1 = document.getElementById("docLink1");
    const docLink2 = document.getElementById("docLink2");

    submitBtn.addEventListener("click", () => {
      const value = passwordInput.value.trim();
      if (value === PASSWORD) {
        errorEl.style.display = "none";
        successEl.style.display = "block";
        docLink1.href = DOC_URL_1;
        docLink2.href = DOC_URL_2;
      } else {
        successEl.style.display = "none";
        errorEl.style.display = "block";
      }
    });

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        submitBtn.click();
      }
    });
  </script>
</body>
</html>
