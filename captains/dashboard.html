<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captains Dashboard — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <h1>Captains Dashboard</h1>
  <p>Quick overview of fixtures, teams, and announcements.</p>

  <div id="dashboard"></div>

  <script>
    const session = JSON.parse(localStorage.getItem("clubSession") || "{}");
    if (!session.loggedIn) {
      window.location.href = "/Home/captains/login.html";
    } else {
      document.getElementById("dashboard").innerHTML = `
        <p>Welcome, ${session.firstname} ${session.surname}</p>
        <p>Your role: ${session.captain_selector}</p>
      `;
    }
  </script>
</body>
</html>
