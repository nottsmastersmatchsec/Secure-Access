  <style>
    .tournament-buttons {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 60px;

    .tournament-buttons a {
      display: inline-block;
      padding: 20px 40px;
      font-size: 1.4rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 10px;
      color: white;
      transition: 0.2s ease-in-out;

      background: #0077cc;
    }
    .senior-btn:hover {
      background: #005fa3;
    }

    .masters-btn {

    }
    .masters-btn:hover {
