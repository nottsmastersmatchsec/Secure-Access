<!DOCTYPE html>
<html>
  <body>
    <h2>SHA‑256 hash generator</h2>
    <p>This will show the hash for: <b>YourStrongPassword123</b></p>
    <pre id="out">Calculating…</pre>

    <script>
      async function go() {
        const msg = "YourStrongPassword123";
        const enc = new TextEncoder().encode(msg);
        const buf = await crypto.subtle.digest("SHA-256", enc);
        const hash = [...new Uint8Array(buf)]
          .map(b => b.toString(16).padStart(2, "0"))
          .join("");
        document.getElementById("out").textContent = hash;
      }
      go();
    </script>
  </body>
</html>
