<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notts Masters Badminton — Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #0a1a33;
    }

    /* Guaranteed centred Facebook box */
    .fb-container {
      width: 100%;
      display: block;          /* ensures full width on mobile */
      text-align: center;      /* centres inline-block children */
    }

    .fb-container iframe {
      display: inline-block;   /* allows text-align to centre it */
      width: 100%;
      max-width: 400px;
      height: 800px;
      border: none;
      overflow: hidden;
      border-radius: 8px;
      margin: 0 auto;          /* fallback centring */
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Notts Masters Badminton</h1>
  <p>Official Club Website</p>
</header>

<!-- Shared nav include -->
<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("nav").innerHTML = data;
    });
</script>

<div class="container">
  <h2>About Us</h2>
  <p>Welcome to the Notts Masters Badminton Club website. Explore fixtures, players, and documents, or access the secure Captains Area.</p>

  <h2>Follow Us on Facebook</h2>

  <div class="fb-container">
    <iframe 
      src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fprofile.php%3Fid%3D100077877812929&tabs=timeline&width=400&height=800&small_header=true&adapt_container_width=true&hide_cover=true&show_facepile=true"
      width="400"
      height="800"
      scrolling="no"
      frameborder="0"
      allowfullscreen="true"
      allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
    </iframe>
  </div>

</div>

<footer>
  © Notts Masters Badminton — Home
</footer>

</body>
</html>
