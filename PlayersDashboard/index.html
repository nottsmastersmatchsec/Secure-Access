<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notts Masters Players Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
      <h1>Notts Masters Player Login</h1>
      <p>Enter your email to receive a secure sign-in link.</p>
      <input type="email" id="login-email" placeholder="you@example.com">
      <button id="send-link-btn">Send Sign-In Link</button>
      <p id="login-message"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
      <header>
        <div>
          <h2>Players Non-Availability</h2>
          <p id="user-info"></p>
          <p id="role-banner"></p>
        </div>
        <div>
          <button id="logout-btn">Log out</button>
        </div>
      </header>

      <section id="controls">
        <div id="add-form">
          <h3>Add Unavailability</h3>

          <label>Age Group
            <select id="age-group">
              <option value="">Select age group</option>
              <option>O40s</option>
              <option>O45s</option>
              <option>O50s</option>
              <option>O55s</option>
              <option>O60s</option>
              <option>O65s</option>
              <option>O70s</option>
            </select>
          </label>

          <label>Start Date & Time
            <input type="datetime-local" id="start-datetime">
          </label>

          <label>End Date & Time
            <input type="datetime-local" id="end-datetime">
          </label>

          <button id="add-entry-btn">Add Unavailability</button>
          <p id="form-message"></p>
        </div>

        <div id="captain-controls" class="hidden">
          <h3>Captain / Selector View</h3>
          <label>Filter by Age Group
            <select id="captain-age-filter">
              <option value="">All age groups</option>
              <option>O40s</option>
              <option>O45s</option>
              <option>O50s</option>
              <option>O55s</option>
              <option>O60s</option>
              <option>O65s</option>
              <option>O70s</option>
            </select>
          </label>
          <button id="refresh-all-btn">Refresh All Players</button>
        </div>
      </section>

      <section id="tables">
        <div>
          <h3>Your Unavailability</h3>
          <table id="player-table">
            <thead>
              <tr>
                <th>Age Group</th>
                <th>Start</th>
                <th>End</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div id="captain-table-wrapper" class="hidden">
          <h3>All Players Unavailability</h3>
          <table id="captain-table">
            <thead>
              <tr>
                <th>Player Name</th>
                <th>Player Email</th>
                <th>Age Group</th>
                <th>Start</th>
                <th>End</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
