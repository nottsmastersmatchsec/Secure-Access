<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Club Login</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 40px auto; }
    label { display: block; margin-top: 12px; }
    input { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 16px; padding: 10px 16px; }
    .error { color: #b00020; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Member Login</h1>

  <form id="login-form">
    <label>
      Email address
      <input type="email" id="email" required />
    </label>

    <label>
      Membership ID (BE Number)
      <input type="text" id="be_number" required />
    </label>

    <label>
      Date of birth
      <input type="date" id="dob" required />
    </label>

    <button type="submit">Login</button>
    <div id="error" class="error"></div>
  </form>

  <script>
    // ⭐ FIXED: You MUST put your real Supabase URL + anon key here
    const SUPABASE_URL = "https://oqibuxukayzipkqxejjj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xaWJ1eHVrYXl6aXBrcXhlampqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTY5MDcsImV4cCI6MjA5NjQ5MjkwN30.rG3saM2ayExDzSjMFnI9x1NVza4SmVIJ7UbAI9NGpH0";

    // ⭐ FIXED: Correct Supabase client creation
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";

      const email = document.getElementById("email").value.trim().toLowerCase();
      const beNumber = document.getElementById("be_number").value.trim();
      const dobInput = document.getElementById("dob").value;

      // ⭐ FIXED: Query now works because client is valid
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, firstname, surname, email_address, be_number, dob, age_group, captain_selector")
        .eq("email_address", email)
        .eq("be_number", beNumber)
        .maybeSingle();

      if (error) {
        errorEl.textContent = "Something went wrong.";
        return;
      }

      if (!data) {
        errorEl.textContent = "No member found with those details.";
        return;
      }

      if (data.dob !== dobInput) {
        errorEl.textContent = "Date of birth does not match.";
        return;
      }

      const session = {
        loggedIn: true,
        memberId: data.id,
        firstname: data.firstname,
        surname: data.surname,
        email_address: data.email_address,
        be_number: data.be_number,
        age_group: data.age_group,
        captain_selector: data.captain_selector,
      };

      localStorage.setItem("clubSession", JSON.stringify(session));

      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
