<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Club Login</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 40px auto; }
    label { display: block; margin-top: 12px; }
    input { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 16px; padding: 10px 16px; }
    .error { color: #b00020; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Member Login</h1>

  <form id="login-form">
    <label>
      Email address
      <input type="email" id="email" required />
    </label>

    <label>
      Membership ID (BE Number)
      <input type="text" id="be_number" required />
    </label>

    <label>
      Date of birth
      <input type="date" id="dob" required />
    </label>

    <button type="submit">Login</button>
    <div id="error" class="error"></div>
  </form>

  <script>
    // TODO: replace with your real values
    const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";

      const email = document.getElementById("email").value.trim().toLowerCase();
      const beNumber = document.getElementById("be_number").value.trim();
      const dobInput = document.getElementById("dob").value; // yyyy-mm-dd

      if (!email || !beNumber || !dobInput) {
        errorEl.textContent = "Please fill in all fields.";
        return;
      }

      // Fetch matching row from Supabase
      const { data, error } = await supabaseClient
        .from("All")
        .select("id, firstname, surname, email_address, be_number, dob, age_group, captain_selector")
        .eq("email_address", email)
        .eq("be_number", beNumber)
        .maybeSingle();

      if (error) {
        console.error(error);
        errorEl.textContent = "Something went wrong. Please try again.";
        return;
      }

      if (!data) {
        errorEl.textContent = "No member found with those details.";
        return;
      }

      // Compare DOB (stored as date in Supabase vs input yyyy-mm-dd)
      const storedDob = data.dob; // e.g. "2005-03-14"
      if (storedDob !== dobInput) {
        errorEl.textContent = "Date of birth does not match our records.";
        return;
      }

      // "Log in" – store minimal profile in localStorage
      const session = {
        loggedIn: true,
        memberId: data.id,
        firstname: data.firstname,
        surname: data.surname,
        email_address: data.email_address,
        be_number: data.be_number,
        age_group: data.age_group,
        captain_selector: data.captain_selector,
      };

      localStorage.setItem("clubSession", JSON.stringify(session));

      // Redirect to dashboard
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
