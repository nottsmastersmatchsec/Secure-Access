<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Member Login — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }

    body > div {
      margin: 0 !important;
      padding: 0 !important;
      max-width: 100% !important;
    }

    .page-wrapper {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #0a1a33;
    }

    form {
      max-width: 400px;
      margin: 0 auto;
      text-align: left;
    }

    label { display: block; margin-top: 12px; }
    input { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 16px; padding: 10px 16px; width: 100%; }
    .error { color: #b00020; margin-top: 8px; text-align: center; }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
<div class="page-wrapper">

  <header>
    <h1>Notts Masters Badminton</h1>
    <p>Member Login</p>
  </header>

  <div id="nav"></div>
  <script>
    fetch("/Home/nav.html")
      .then(r => r.text())
      .then(html => document.getElementById("nav").innerHTML = html);
  </script>

  <div class="container">
    <h2>Login</h2>

    <form id="login-form">
      <label>Email address
        <input type="email" id="email" required />
      </label>

      <label>Membership ID (BE Number)
        <input type="text" id="be_number" required />
      </label>

      <label>Date of birth
        <input type="date" id="dob" required />
      </label>

      <button type="submit">Login</button>
      <div id="error" class="error"></div>
    </form>
  </div>

  <footer>
    © Notts Masters Badminton — Login
  </footer>

</div>

<script>
  const SUPABASE_URL = "https://oqibuxukayzipkqxejjj.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR_REAL_ANON_KEY";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById("login-form");
  const errorEl = document.getElementById("error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.textContent = "";

    const email = document.getElementById("email").value.trim().toLowerCase();
    const beNumber = document.getElementById("be_number").value.trim();
    const dobInput = document.getElementById("dob").value;

    const { data, error } = await supabaseClient
      .from("profiles")
      .select("id, firstname, surname, email_address, be_number, dob, age_group, captain_selector")
      .eq("email_address", email)
      .eq("be_number", beNumber)
      .maybeSingle();

    if (error) return errorEl.textContent = "Something went wrong.";
    if (!data) return errorEl.textContent = "No member found with those details.";
    if (data.dob !== dobInput) return errorEl.textContent = "Date of birth does not match.";

    localStorage.setItem("clubSession", JSON.stringify({
      loggedIn: true,
      ...data
    }));

    // NEW: redirect support
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get("redirect");

    if (redirect === "captains") {
      window.location.href = "/Home/captains/access.html";
      return;
    }

    window.location.href = "dashboard.html";
  });
</script>

</body>
</html>
