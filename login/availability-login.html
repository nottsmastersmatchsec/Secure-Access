<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Player Availability Login — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    html, body { margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }

    /* ⭐ CRITICAL — match homepage */
    body > div {
      margin: 0 !important;
      padding: 0 !important;
      max-width: 100% !important;
    }

    .page-wrapper {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover { text-decoration: underline; }

    /* ⭐ CRITICAL — match homepage */
    .container {
      max-width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    form {
      max-width: 400px;
      margin: 0 auto;
      text-align: left;
    }

    label { display: block; margin-top: 12px; }
    input { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 16px; padding: 10px 16px; width: 100%; }

    .error { color: #b00020; margin-top: 8px; text-align: center; }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
<div class="page-wrapper">

<header>
  <h1>Notts Masters Badminton</h1>
  <p>Player Availability Login</p>
</header>

<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(r => r.text())
    .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div class="container">
  <h2>Login</h2>

  <form id="login-form">
    <label>Email address
      <input type="email" id="email" required />
    </label>

    <label>Membership ID (BE Number)
      <input type="text" id="be_number" required />
    </label>

    <label>Date of birth
      <input type="date" id="dob" required />
    </label>

    <button type="submit">Login</button>
    <div id="error" class="error"></div>
  </form>
</div>

<footer>
  © Notts Masters Badminton — Player Availability Login
</footer>

</div>

<script>
  const supabaseClient = supabase.createClient(
    "https://oqibuxukayzipkqxejjj.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
  );

  const form = document.getElementById("login-form");
  const errorEl = document.getElementById("error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.textContent = "";

    const email = email.value.trim().toLowerCase();
    const beNumber = be_number.value.trim();
    const dobInput = dob.value;

    const { data } = await supabaseClient
      .from("profiles")
      .select("*")
      .eq("email_address", email)
      .eq("be_number", beNumber)
      .maybeSingle();

    if (!data || data.dob !== dobInput) {
      errorEl.textContent = "No member found with those details.";
      return;
    }

    localStorage.setItem("clubSession", JSON.stringify({ loggedIn: true, ...data }));

    window.location.href = "/Home/player-availability/access.html";
  });
</script>

</body>
</html>
