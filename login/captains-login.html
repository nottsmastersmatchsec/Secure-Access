<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captains Login — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Captains & Selectors Login</h1>
  <form id="login-form">
    <label>Email <input type="email" id="email" required /></label><br>
    <label>BE Number <input type="text" id="be_number" required /></label><br>
    <label>DOB (DD/MM/YYYY) <input type="text" id="dob" required /></label><br>
    <button type="submit">Login</button>
    <div id="error"></div>
  </form>

  <script>
    const supabaseClient = supabase.createClient(
      "https://oqibuxukayzipkqxejjj.supabase.co",
      "YOUR_NEW_ANON_KEY"
    );

    function normaliseDob(input) {
      if (!input) return "";
      const cleaned = input.replace(/[\/ ]/g, "-");
      const match = cleaned.match(/^(\d{2})-(\d{2})-(\d{4})$/);
      if (match) {
        const [_, dd, mm, yyyy] = match;
        return `${yyyy}-${mm}-${dd}`;
      }
      return "";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const emailInput = document.getElementById("email").value.trim().toLowerCase();
      const beNumberInput = document.getElementById("be_number").value.trim();
      const dobInput = normaliseDob(document.getElementById("dob").value.trim());

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("email_address", emailInput)
        .eq("be_number", beNumberInput)
        .maybeSingle();

      if (error || !data) return document.getElementById("error").textContent = "No member found";

      const supaDob = (data.dob || "").split("T")[0];
      if (supaDob !== dobInput) return document.getElementById("error").textContent = "DOB mismatch";

      const role = (data.captain_selector || "").toLowerCase().trim();
      if (role !== "captain" && role !== "selector") return document.getElementById("error").textContent = "No access";

      localStorage.setItem("clubSession", JSON.stringify({ loggedIn: true, ...data }));
      window.location.href = "/Home/captains/access.html";
    });
  </script>
</body>
</html>
